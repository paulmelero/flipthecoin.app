media:
  # `input` is a repo-root-relative path (no leading/trailing slash) to where
  # files are physically stored. The Nuxt app lives in apps/flipthecoin/.
  input: apps/flipthecoin/public/img/uploads
  # `output` is the path as referenced in content (matches /img/uploads/... in markdown).
  output: /img/uploads

content:
  - name: blog
    label: Blog
    type: collection
    path: apps/flipthecoin/content/blog
    # No native i18n in Pages CMS: each locale file (*.en.md / *.es.md) shows as
    # its own entry. New entries follow the existing slug.locale.md convention.
    filename: '{fields.slug}.{fields._locale}.md'
    view:
      fields: [title, _locale, published, date]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: slug
        label: Slug
        type: string
      - name: _locale
        label: Locale
        type: select
        options:
          values: [en, es]
      - name: description
        label: Description
        type: text
        options:
          maxlength: 180
      - name: published
        label: Published
        type: boolean
      - name: author
        label: Author
        # Optional (matches author?: optional in content.config.ts). Stores the
        # author's slug; `label` shows the human name (the default `{name}` would
        # show the filename, so it's set explicitly to the name field).
        type: reference
        options:
          collection: authors
          value: '{fields.slug}'
          label: '{fields.name}'
          search: 'fields.name'
      - name: date
        label: Date
        type: date
        # Content stores full ISO timestamps (e.g. 2026-06-06T10:00:00Z); time:true
        # + format keep them parseable and prevent the time part being dropped on save.
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssXXX"
      - name: body
        label: Body
        # `code` (raw markdown) instead of `rich-text`: the WYSIWYG editor is
        # Tiptap and would strip LaTeX ($...$), raw HTML (<sup>, target="_blank"),
        # and the <!--more--> excerpt marker on save. `code` round-trips verbatim.
        type: code
        options:
          format: markdown
      - name: tags
        label: Tags
        type: string
        list: true
      - name: level
        label: Level
        type: select
        options:
          values: [beginner, intermediate, advanced]
      - name: series
        label: Series
        # Locale-neutral slug of the series this post belongs to (matches a
        # series entry's `slug`). Leave empty for standalone posts.
        type: string
      - name: seriesOrder
        label: Series Order
        # Position of this post within its series (1, 2, 3 …). Drives the
        # reading order in the series block; ignored when `series` is empty.
        type: number

  - name: series
    label: Series
    type: collection
    path: apps/flipthecoin/content/series
    # Per-locale yml (like blog posts, not authors): title/description are
    # translatable prose, so each series has a <slug>.<locale>.yml variant.
    format: yaml
    filename: '{fields.slug}.{fields._locale}.yml'
    view:
      fields: [title, slug, _locale, date]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: slug
        label: Slug
        # Locale-neutral: identical across the .en/.es variants. Blog posts
        # reference this value in their `series` field.
        type: string
        pattern:
          regex: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          message: Lowercase letters, numbers and hyphens only (e.g. random-walks)
      - name: _locale
        label: Locale
        type: select
        options:
          values: [en, es]
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
        options:
          maxlength: 240
      - name: date
        label: Date
        # Optional. Pins where the series block sits in the blog list. Leave
        # empty to anchor it at its most-recent member's date.
        type: date
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssXXX"

  - name: authors
    label: Authors
    type: collection
    path: apps/flipthecoin/content/authors
    # Data collection: .yml files with no body (matches the `authors` Nuxt
    # Content collection, type: data, source: authors/**.yml).
    format: yaml
    # Filename is derived from `slug` so the on-disk stem always equals the
    # stored slug (the blog `author` reference stores this same slug, and the
    # app resolves authors by matching post.author against the file stem).
    filename: '{fields.slug}.yml'
    view:
      fields: [name, slug, url]
      primary: name
    fields:
      - name: name
        label: Name
        type: string
      - name: slug
        label: Slug
        type: string
        pattern:
          regex: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          message: Lowercase letters, numbers and hyphens only (e.g. paul-melero)
      - name: url
        label: URL
        type: string
        pattern:
          regex: '^https?://.+'
          message: Must be a valid URL starting with http:// or https://
      - name: avatar
        label: Avatar
        type: image

  # Pages are localized as <name>.<locale>.md, so each needs its own file entry.
  - name: homepage-en
    label: Home Page (EN)
    type: file
    path: apps/flipthecoin/content/pages/index.en.md
    fields:
      - name: title
        label: Title
        type: string
      - name: slug
        label: Slug
        type: string
      - name: description
        label: Description
        type: text
        options:
          maxlength: 180
      - name: _locale
        label: Locale
        type: select
        options:
          values: [en, es]
      - name: body
        label: Body
        # `code` (raw markdown) instead of `rich-text`: the WYSIWYG editor is
        # Tiptap and would strip LaTeX ($...$), raw HTML (<sup>, target="_blank"),
        # and the <!--more--> excerpt marker on save. `code` round-trips verbatim.
        type: code
        options:
          format: markdown
  - name: homepage-es
    label: Home Page (ES)
    type: file
